  - title: "2026 Family Update: We Sold Our Fifth Wheel for a Class A Diesel Pusher!"
    description: "A big year of change for the Newman family! In this 2026 catch-up episode, we share why we sold our fifth wheel and truck and made the jump to a Class A diesel pusher — and what RV life looks like now in our new home on wheels. We rewind through our early-year travels, talk through a busy season of youth baseball and life off the road, and explain how we landed back on the road and soaking up the sunshine in Florida. Whether you're weighing a fifth wheel versus a Class A, balancing travel with kids' sports, or just curious how a homeschooling family of six keeps the adventure going, this episode is your full-family RV life update for 2026."
    publication_date: "2026-06-08T00:00:00Z"
    asset_url: "https://archive.org/download/06.07.2025_202606/06.07.2025.mp3"
    duration: "27:45"
    file_size: 30842412
    episode_number: 2
    season_number: 1
    explicit: false
  - title: "Disney Fantasy vs. Disney Wish: Lookout Cay & Castaway Cay Compared"
    description: "Two Disney ships, two island days — which one wins? In this episode we break down our January Disney Fantasy cruise to Lookout Cay at Lighthouse Point and compare it head-to-head with our previous Disney Wish sailing to Castaway Cay. We get into the real differences between the Fantasy and the Wish — staterooms, dining, kids' clubs, and the onboard vibe — then dig into the two private island experiences: beaches, excursions, food, crowds, and which one our family of six would book again. If you're trying to decide between the Disney Fantasy and the Disney Wish, or wondering whether Lookout Cay or Castaway Cay is the better port day, this honest cruise comparison has you covered."
    publication_date: "2026-06-11T00:00:00Z"
    asset_url: "https://archive.org/download/06.10.2026/06.10.2026.mp3"
    duration: "29:50"
    file_size: 32837907
    episode_number: 3
    season_number: 1
    explicit: false
  - title: "Disney's Fort Wilderness Pre-Trip: Preferred Sites, RV Backing Tips & Free Water Park Day"
    description: "We're heading to Disney's Fort Wilderness Resort & Campground for a full Sunday-to-Sunday week, and in this pre-trip episode we walk through exactly what we're planning — and the RV tips we've picked up along the way. We're moving our new-to-us Class A into a preferred site (the smaller, original 100–300 loops), and we share how site assignment really works at check-in, why arriving early helps you get in, and our best advice for backing a big rig into a tight Fort Wilderness site without the stress — go slow, because slow is pro and fast is expensive. We also cover the free water park day Disney resort and campground guests get in 2026 (and why it's the campsites' last year for it), the new zero-entry pool at the Settlement, bike lights for Fort Wilderness's dark loops, summer yellow flies and the clover loops, bringing a dog to Trails End, the hot pool chairs to watch out for, and picking up our son for his first solo flight. Whether you're booking a preferred site or planning your first RV stay at Walt Disney World, this is your friendly Fort Wilderness pre-trip guide. Planning a Disney, Universal, or cruise trip? We're travel agents and our planning is 100% free — Disney pays us, not you. Reach us at navigatingnewmans.com. New episodes every Sunday."
    publication_date: "2026-06-15T00:00:00Z"
    asset_url: "https://archive.org/download/06.14.2026/06.14.2026.mp3"
    duration: "24:08"
    file_size: 26354673
    episode_number: 4
    season_number: 1
    explicit: false
  - title: "First-Timers at Universal Orlando: VelociCoaster, Hagrid's, Gringotts & Hollywood Studios"
    description: "It was a packed week for the Newman family! In this recap we walk you through our Universal Orlando first-timer adventures — multiple trips across Islands of Adventure and Universal Studios — plus a night at Disney's Hollywood Studios and the real chaos of full-time RV life. We get into the rides: VelociCoaster (our new favorite, ridden three times), Hagrid's Magical Creatures Motorbike Adventure and its never-ending 80-minute cave queue, Harry Potter and the Escape from Gringotts, Forbidden Journey (where Henry got pulled off over his interactive wand), the Incredible Hulk Coaster, Doctor Doom's Fearfall, Skull Island: Reign of Kong, Revenge of the Mummy, Cat in the Hat, and the Hogwarts Express. We compare Universal's lines, lockers, and metal detectors to Disney, cover single rider and parent swap, and share first-timer tips we wish we'd known. On the Disney side, we hit Hollywood Studios — Tower of Terror, Mickey & Minnie's Runaway Railway, Star Tours, and Millennium Falcon: Smugglers Run (now Mandalorian-themed) — plus a Skyliner ride to Caribbean Beach for coconut bread pudding. And in true RV-family fashion, we recap the day our Class A diesel pusher's license-plate trip went sideways at the Florida DMV, grocery runs, the great sunblock debate, and our go-to cheap eats. Whether you're planning your first Universal Orlando trip, weighing it against Walt Disney World, or just love a real family-travel recap, come ride along. Planning a Disney, Universal, or cruise trip? We're travel agents and our planning is 100% free — Disney pays us, not you. Reach us at navigatingnewmans.com. New episodes every week."
    publication_date: "2026-06-18T00:00:00Z"
    asset_url: "https://archive.org/download/06.17.2026/06.17.2026.mp3"
    duration: "49:49"
    file_size: 53644027
    episode_number: 5
    season_number: 1
    explicit: false

  - title: "Our Week at Disney's Fort Wilderness: Andrew's Back, Blizzard Beach, Flight of Passage & a Surprise Campsite Move"
    description: "We just spent a full week at Disney's Fort Wilderness Resort & Campground in 90-degree heat — and the whole family was back together with Andrew home for the trip. In this week-recap episode we cover it all: arriving early on check-in day and backing our Class A into a tight preferred site, a first-timer trip to Blizzard Beach with its slides, crowds, and great mat-slide mishaps, and picking Andrew up from the airport with one very excited dog. We hit the parks hard — Guardians of the Galaxy, Soarin' Over America, and Living with the Land at Epcot; Expedition Everest, the Bluey train, a peekaboo ostrich, and Flight of Passage at Animal Kingdom; and a Magic Kingdom night with Space Mountain, the PeopleMover, Big Thunder, and a last-chance ride on the Carousel of Progress. Then the week threw us a curveball: an underground fire across the creek meant a same-night campsite move from the 300 loop to the 800 loop — in the middle of a downpour. We also bought Andrew a day at Universal Orlando for VelociCoaster, the Incredible Hulk, Forbidden Journey, Skull Island: Reign of Kong, Fast & Furious, butterbeer, and more, checked out the brand-new zero-entry pool at the Settlement, and wrapped the week with a Father's Day waffles-and-chimichangas dinner before saying goodbye to Andrew. Whether you're planning your first RV stay at Walt Disney World or just love a real family-travel recap, come ride along. Planning a Disney, Universal, or cruise trip? We're travel agents and our planning is 100% free — Disney pays us, not you. Reach us at navigatingnewmans.com. New episodes every Sunday."
    publication_date: "2026-06-22T00:00:00Z"
