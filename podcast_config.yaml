  - title: "Our RV Stories & Campground Etiquette: The Unwritten Rules of RV Life"
    description: >
      A mid-week episode recorded from Tropical Palms in 100-degree heat. Joseph
      and Stefanie swap their best RV stories and the campground etiquette that
      makes camping better for everyone — people treating your site like a public
      park, walking straight through campsites, golf-cart right-of-way, dog
      clean-up, and a string of backing-in disasters — plus what they've learned
      switching from a fifth wheel to a Class A motorhome.
